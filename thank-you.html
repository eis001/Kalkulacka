<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Děkujeme | EH STUDIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .thank-you-page {
      min-height: 100vh;
      position: relative;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .thank-you-page .calc-top-bar {
      position: absolute;
      top: 0;
      z-index: 1;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .thank-you-page .calc-back {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
    }
    .thank-you-page .calc-back:hover { color: #111827; }
    .thank-you-page .calc-logo {
      font-size: 0.875rem;
      font-weight: 600;
      color: #6b7280;
      text-decoration: none;
    }
    .thank-you-page .calc-logo:hover { color: #111827; }
    .thank-you-card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 3rem 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      max-width: 480px;
    }
    .thank-you-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(34, 197, 94, 0.1);
      color: #059669;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thank-you-icon svg { width: 28px; height: 28px; }
    .thank-you-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }
    .thank-you-text {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
    }
    .thank-you-link {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-accent);
      text-decoration: none;
    }
    .thank-you-link:hover { text-decoration: underline; }
  </style>
</head>
<body class="thank-you-page has-bg-animation">
  <div id="bg-animation-wrapper" class="bg-animation-wrapper">
    <div id="floating-lines-container" class="floating-lines-container"></div>
    <div class="bg-gradient-overlay"></div>
    <div class="bg-focus-gradient"></div>
  </div>
  <header class="calc-top-bar">
    <a href="index.html" class="calc-back">← Zpět</a>
    <a href="index.html" class="calc-logo">EH STUDIO</a>
  </header>

  <div class="thank-you-card">
    <div class="thank-you-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="thank-you-title">Děkujeme, poptávka byla odeslána.</h1>
    <p class="thank-you-text">Ozveme se vám co nejdříve.</p>
    <a href="index.html" class="thank-you-link">← Zpět na úvodní stránku</a>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="background-animation.js"></script>
  <script>
    (function() {
      var el = document.getElementById('floating-lines-container');
      if (el && typeof initBackgroundAnimation === 'function') {
        initBackgroundAnimation(el, {
          linesGradient: ['#4f7cff', '#e8e9ff', '#ff6a5f'],
          animationSpeed: 1,
          bendRadius: 5,
          bendStrength: -0.5,
          mouseDamping: 0.05,
          parallax: true,
          parallaxStrength: 0.2,
          interactive: true
        });
      }
    })();
  </script>
</body>
</html>
